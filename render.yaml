services:
  # Backend API
  - type: web
    name: spotify-clone-api
    env: node
    plan: starter
    region: singapore # Chọn vùng gần Việt Nam nhất cho bớt lag
    buildCommand: npm install --include=dev && npm run build:api && npx prisma migrate deploy --schema=apps/api/prisma/schema.prisma
    startCommand: node apps/api/dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: spotify-db # Nếu dùng DB của Render, hoặc sếp nhập tay nếu dùng Neon
          property: connectionString
      - key: MONGODB_URI
        sync: false # Sếp sẽ nhập link Mongo Atlas vào Dashboard
      - key: REDIS_URL
        sync: false # Sếp sẽ nhập link Upstash vào Dashboard
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: MEILI_HOST
        sync: false
      - key: MEILI_MASTER_KEY
        sync: false
      - key: FRONTEND_URL
        fromService:
          type: static
          name: spotify-clone-web
          property: url
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

  # Frontend Web
  - type: static
    name: spotify-clone-web
    env: static
    plan: free # Static site trên Render là miễn phí
    buildCommand: npm install --include=dev && npm run build:web
    staticPublishDir: apps/web/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: spotify-clone-api
          property: url
        suffix: /api/v1
